name: Generate Snake Animation

on:
  # Runs automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Generate both the light and dark SVG snake files
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Step 2: Push the generated SVGs to the 'output' branch
      #         (this is the branch the README picture tags reference)
      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
